
# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # O'rtacha yuklama uchun 1 ta instance yetarli (Spark/Blaze uchun mos)
  maxInstances: 1
  minInstances: 0
  memoryPerInstance: 512Mi

